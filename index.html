<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitee Pages 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FDF8F3 0%, #F5E6D3 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .container { text-align: center; padding: 40px; }
        h1 { color: #8B7355; font-size: 2rem; margin-bottom: 20px; font-weight: normal; }
        .test-box {
            background: white;
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.15);
            margin-top: 20px;
        }
        .success { color: #6B8E6B; font-size: 1.3rem; }
        .emoji { font-size: 3rem; margin-bottom: 15px; }
        p { color: #7A7A7A; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎉</div>
        <h1>Gitee Pages 测试成功！</h1>
        <div class="test-box">
            <p class="success">✅ 如果你看到这个页面，说明部署成功</p>
            <p>现在告诉我，我们继续完善网站</p>
        </div>
    </div>
</body>
</html>
